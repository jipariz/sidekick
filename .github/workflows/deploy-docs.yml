name: Deploy Docs & Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-demo:
    name: Build WasmJS demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build WasmJS demo
        run: ./gradlew :demo-app:wasmJsBrowserDistribution --no-daemon

      - name: Upload demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-dist
          path: demo-app/build/dist/wasmJs/productionExecutable/
          retention-days: 1

  build-docs:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
          retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    needs: [build-demo, build-docs]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download docs site
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site/

      - name: Download demo dist
        uses: actions/download-artifact@v4
        with:
          name: demo-dist
          path: site/demo/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
